# persist-dev tmux config
set -g default-terminal "tmux-256color"
set -sg escape-time 0
set -ga terminal-overrides ",*256col*:Tc"
set -g focus-events on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g mouse on
# OSC 52 clipboard integration: copies tmux selections directly to client OS clipboard over SSH/mosh
set -s set-clipboard on
set -as terminal-features ',xterm*:clipboard'
set -as terminal-overrides ',xterm*:Ms=\E]52;c;%p2%s\07'

# Toggle mouse mode with Ctrl-b m (useful for native terminal text selection)
bind-key m set -g mouse \; display-message "Mouse: #{?mouse,ON (tmux select),OFF (native terminal select)}"
# Detaching should be easy to remember.
bind-key -n C-a send-prefix
# Reasonable prefix reminder is unnecessary; keep defaults (Ctrl-b).
